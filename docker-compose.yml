version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: secure_ai_postgres
    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: secure_ai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - secure_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: secure_ai_redis
    command: redis-server --requirepass change_me
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - secure_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  vault:
    image: vault:latest
    container_name: secure_ai_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    networks:
      - secure_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - all
    cap_add:
      - ipc_lock

  ollama:
    image: ollama/ollama:latest
    container_name: secure_ai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - secure_network
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434

networks:
  secure_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  vault_data:
  ollama_data: