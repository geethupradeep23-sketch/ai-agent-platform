version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: secure_ai_postgres
    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: secure_ai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - secure_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: secure_ai_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - secure_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  vault:
    image: vault:latest
    container_name: secure_ai_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-myroot}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    networks:
      - secure_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - all
    cap_add:
      - ipc_lock

  ollama:
    image: ollama/ollama:latest
    container_name: secure_ai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - secure_network
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure_ai_backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://aiuser:${DB_PASSWORD:-secure_password}@postgres:5432/secure_ai_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-min-32-chars}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-your-256-bit-hex-key}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - secure_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

networks:
  secure_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  vault_data:
  ollama_data:
